# Recommended starting point from V100 sweep on condo-slagergr.
# Derived from configs/rhea_v100_sweep.yaml with:
# - batch_size=1024
# - lr=1e-3
# - no batch norm
# - large model preset

seed: 42

output:
  dir: ../outputs
  experiment_name: rhea_v100_recommended

data:
  train_files:
    - ../benchmark_data_box3d_abs/asymptotic_M1-NuLib.h5
    - ../benchmark_data_box3d_abs/asymptotic_M1-NuLib-7ms.h5
    - ../benchmark_data_box3d_abs/stable_M1-LeakageRates_rl0.h5
    - ../benchmark_data_box3d_abs/stable_M1-LeakageRates_rl1.h5
    - ../benchmark_data_box3d_abs/stable_M1-NuLib-old_rl0.h5
    - ../benchmark_data_box3d_abs/stable_M1-NuLib_rl0.h5
    - ../benchmark_data_box3d_abs/stable_M1-NuLib_rl1.h5
    - ../benchmark_data_box3d_abs/stable_M1-Nulib-7ms_rl0.h5
    - ../benchmark_data_box3d_abs/stable_M1-Nulib-7ms_rl1.h5
    - ../benchmark_data_box3d_abs/stable_oneflavor.h5
    - ../benchmark_data_box3d_abs/stable_random.h5
    - ../benchmark_data_box3d_abs/stable_zerofluxfac.h5
  val_files:
    - ../benchmark_data_box3d_abs/asymptotic_M1-NuLib-old.h5
    - ../benchmark_data_box3d_abs/stable_M1-LeakageRates_rl2.h5
    - ../benchmark_data_box3d_abs/stable_M1-NuLib_rl2.h5
    - ../benchmark_data_box3d_abs/stable_M1-Nulib-7ms_rl2.h5
  test_files:
    - ../benchmark_data_box3d_abs/asymptotic_random.h5
    - ../benchmark_data_box3d_abs/stable_M1-LeakageRates_rl3.h5
    - ../benchmark_data_box3d_abs/stable_M1-NuLib_rl3.h5
    - ../benchmark_data_box3d_abs/stable_M1-Nulib-7ms_rl3.h5
  hdf5:
    strict: true
    swmr: false
  keys:
    input: normalized/F4_initial(1|ccm)
    bc_target: stable
    vector_target: normalized/targets/F4_final(1|ccm)
    reg_target: normalized/targets/growthRate(1|s)
    sample_weight: null
    bc_sample_weight: masks/bc_target_weight
    vector_sample_weight: masks/vector_target_weight
    reg_sample_weight: masks/reg_target_weight
  preprocess:
    reshape:
      input: flatten
      vector_target: flatten
  loader:
    batch_size: 1024
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    drop_last: false
    shuffle_train: true

model:
  input_dim: 24
  trunk:
    hidden_dims: [512, 512, 256]
    activation: gelu
    batch_norm: false
    layer_norm: false
    dropout: 0.10
    residual: false
    freeze: false
    recalibration:
      enabled: false
      reduction: 4
      min_hidden_dim: 8
  heads:
    bc:
      hidden_dims: [128, 64]
      output_dim: 1
      activation: relu
      batch_norm: false
      layer_norm: false
      dropout: 0.0
      residual: false
      freeze: false
      recalibration:
        enabled: false
        reduction: 4
        min_hidden_dim: 4
    vector_regression:
      hidden_dims: [256, 128]
      output_dim: 24
      activation: relu
      batch_norm: false
      layer_norm: false
      dropout: 0.0
      residual: false
      freeze: false
      recalibration:
        enabled: false
        reduction: 4
        min_hidden_dim: 4
    regression:
      hidden_dims: [128, 64]
      output_dim: 1
      activation: relu
      batch_norm: false
      layer_norm: false
      dropout: 0.0
      residual: false
      freeze: false
      recalibration:
        enabled: false
        reduction: 4
        min_hidden_dim: 4

losses:
  bc:
    kind: binary_classification
    name: bce_with_logits
    pos_weight: null
  vector_regression:
    kind: vector_regression
    name: smooth_l1
    beta: 1.0
  regression:
    kind: regression
    name: smooth_l1
    beta: 1.0

multitask:
  loss_balancer:
    name: static
    static_weights:
      bc: 1.0
      vector_regression: 1.0
      regression: 1.0
    kendall_gal:
      initial_log_vars:
        bc: 0.0
        vector_regression: 0.0
        regression: 0.0
    gradnorm:
      alpha: 1.5
      lr: 0.025
      initial_weights:
        bc: 1.0
        vector_regression: 1.0
        regression: 1.0
  gradient_surgery:
    name: none
    reduction: mean

training:
  device: auto
  cpu_num_threads: 8
  cpu_num_interop_threads: 2
  deterministic: false
  epochs: 40
  mixed_precision: true
  compile_model: false
  grad_clip_norm: 1.0
  gradient_accumulation_steps: 1
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1.0e-8
    param_groups:
      - module: trunk
        lr: 0.001
        weight_decay: 0.01
      - module: heads.bc
        lr: 0.001
        weight_decay: 0.0
      - module: heads.vector_regression
        lr: 0.001
        weight_decay: 0.0
      - module: heads.regression
        lr: 0.001
        weight_decay: 0.0
  scheduler:
    name: cosine
    T_max: 40
    eta_min: 1.0e-6
  early_stopping:
    enabled: true
    monitor: val/total_loss
    mode: min
    patience: 8

logging:
  train_log_interval: 20
  save_every_epoch: true
  keep_last_n_checkpoints: 5

evaluation:
  bc_threshold: 0.5
  control:
    enabled: true
    compute_during_fit: false
    input_is_normalized: true
    nf: 3
    ratio_eps: 1.0e-8
    ratio_floor_quantile: 0.10
