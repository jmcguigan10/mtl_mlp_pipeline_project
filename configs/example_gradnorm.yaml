seed: 42

output:
  dir: ../outputs
  experiment_name: gradnorm_demo

data:
  train_files:
    - ../example_data/train_a.h5
    - ../example_data/train_b.h5
  val_files:
    - ../example_data/val.h5
  test_files:
    - ../example_data/test.h5
  hdf5:
    strict: true
    swmr: false
  keys:
    input: inputs
    bc_target: targets/bc
    vector_target: targets/vector
    reg_target: targets/reg
    sample_weight: null
  loader:
    batch_size: 128
    num_workers: 0
    pin_memory: true
    persistent_workers: false
    drop_last: false
    shuffle_train: true

model:
  input_dim: 24
  trunk:
    hidden_dims: [256, 256, 128]
    activation: gelu
    batch_norm: true
    layer_norm: false
    dropout: 0.10
    residual: false
    freeze: false
    recalibration:
      enabled: true
      reduction: 4
      min_hidden_dim: 8
  heads:
    bc:
      hidden_dims: [64]
      output_dim: 1
      activation: relu
      batch_norm: false
      layer_norm: false
      dropout: 0.05
      residual: false
      freeze: false
      recalibration:
        enabled: false
        reduction: 4
        min_hidden_dim: 4
    vector_regression:
      hidden_dims: [64, 32]
      output_dim: 3
      activation: relu
      batch_norm: false
      layer_norm: false
      dropout: 0.05
      residual: false
      freeze: false
      recalibration:
        enabled: false
        reduction: 4
        min_hidden_dim: 4
    regression:
      hidden_dims: [32]
      output_dim: 1
      activation: relu
      batch_norm: false
      layer_norm: false
      dropout: 0.0
      residual: false
      freeze: false
      recalibration:
        enabled: false
        reduction: 4
        min_hidden_dim: 4

losses:
  bc:
    kind: binary_classification
    name: bce_with_logits
    pos_weight: null
  vector_regression:
    kind: vector_regression
    name: smooth_l1
    beta: 1.0
  regression:
    kind: regression
    name: mse

multitask:
  loss_balancer:
    name: gradnorm
    static_weights:
      bc: 1.0
      vector_regression: 1.0
      regression: 1.0
    kendall_gal:
      initial_log_vars:
        bc: 0.0
        vector_regression: 0.0
        regression: 0.0
    gradnorm:
      alpha: 1.5
      lr: 0.025
      initial_weights:
        bc: 1.0
        vector_regression: 1.0
        regression: 1.0
  gradient_surgery:
    name: none
    reduction: mean

training:
  device: auto
  cpu_num_threads: 1
  cpu_num_interop_threads: 1
  deterministic: false
  epochs: 8
  mixed_precision: false
  compile_model: false
  grad_clip_norm: 1.0
  gradient_accumulation_steps: 1
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1.0e-8
    param_groups:
      - module: trunk
        lr: 0.001
        weight_decay: 0.01
      - module: heads.bc
        lr: 0.0007
        weight_decay: 0.0
      - module: heads.vector_regression
        lr: 0.001
        weight_decay: 0.0
      - module: heads.regression
        lr: 0.001
        weight_decay: 0.0
  scheduler:
    name: cosine
    T_max: 8
    eta_min: 1.0e-6
  early_stopping:
    enabled: true
    monitor: val/total_loss
    mode: min
    patience: 5

logging:
  train_log_interval: 10
  save_every_epoch: true
  keep_last_n_checkpoints: 3

evaluation:
  bc_threshold: 0.5
